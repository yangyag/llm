services:
  db:
    image: yangyag2/llm-db:18
    container_name: llm-db
    env_file:
      - /home/ubuntu/llm.env
    volumes:
      - llm-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  back:
    image: yangyag2/llm-back:latest
    container_name: llm-back
    env_file:
      - /home/ubuntu/llm.env
    volumes:
      - llm-back-attachments:/var/lib/llm/attachments
      - llm-back-upload-sessions:/var/lib/llm/upload-sessions
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /api/v1/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3; grep -q \"\\\"status\\\":\\\"UP\\\"\" <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  front:
    image: yangyag2/llm-front:latest
    container_name: llm-front
    ports:
      - "8083:80"
    depends_on:
      back:
        condition: service_healthy
    restart: unless-stopped

volumes:
  llm-pgdata:
  llm-back-attachments:
  llm-back-upload-sessions:
