services:
  back:
    container_name: llm-back
    build:
      context: ./back
      dockerfile: Dockerfile
    env_file:
      - ./ai-keys.env
    environment:
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5174,http://localhost:8083}
      APP_DB_HOST: ${APP_DB_HOST:-host.docker.internal}
      APP_DB_PORT: ${APP_DB_PORT:-5432}
      APP_DB_NAME: ${APP_DB_NAME:-yangyag}
      APP_DB_USER: ${APP_DB_USER:-yangyag}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:-yangyag1!}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8082:8080"
    restart: unless-stopped

  front:
    container_name: llm-front
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "8083:80"
    depends_on:
      - back
    restart: unless-stopped
