services:
  back:
    image: ${LLM_BACK_IMAGE:-yangyag2/llm-back:latest}
    container_name: llm-back
    env_file:
      - ${LLM_ENV_FILE:-./.env}
    networks:
      - default
      - auto_default
    volumes:
      - llm-back-attachments:/var/lib/llm/attachments
      - llm-back-upload-sessions:/var/lib/llm/upload-sessions
    expose:
      - "8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /api/v1/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3; grep -q \"\\\"status\\\":\\\"UP\\\"\" <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  front:
    image: ${LLM_FRONT_IMAGE:-yangyag2/llm-front:latest}
    container_name: llm-front
    ports:
      - "${LLM_FRONT_PORT:-8083}:80"
    depends_on:
      back:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  back-build:
    profiles:
      - build
    image: ${LLM_BACK_IMAGE:-yangyag2/llm-back:latest}
    build:
      context: ./back
      dockerfile: Dockerfile
    entrypoint: ["true"]

  front-build:
    profiles:
      - build
    image: ${LLM_FRONT_IMAGE:-yangyag2/llm-front:latest}
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    entrypoint: ["true"]

volumes:
  llm-back-attachments:
  llm-back-upload-sessions:

networks:
  auto_default:
    external: true
