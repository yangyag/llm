spring.application.name=llm-backend
app.cors.allowed-origins=http://localhost:5174,http://localhost:8083
spring.datasource.url=jdbc:postgresql://${APP_DB_HOST:localhost}:${APP_DB_PORT:5432}/${APP_DB_NAME:yangyag}
spring.datasource.username=${APP_DB_USER:yangyag}
