spring.application.name=llm-backend
app.cors.allowed-origins=http://localhost:5174,http://localhost:8083
spring.datasource.url=jdbc:postgresql://${APP_DB_HOST:host.docker.internal}:${APP_DB_PORT:5432}/${APP_DB_NAME:yangyag}
spring.datasource.username=${APP_DB_USER:yangyag}
spring.datasource.password=${APP_DB_PASSWORD:yangyag1!}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
app.attachments.root-path=${APP_ATTACHMENTS_ROOT_PATH:${java.io.tmpdir}/llm-attachments}
app.jwt.secret=${APP_JWT_SECRET:defaultSecretKeyForDevelopmentOnlyMustBeAtLeast256Bits!!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
spring.servlet.multipart.max-file-size=${APP_ATTACHMENTS_MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${APP_ATTACHMENTS_MAX_REQUEST_SIZE:100MB}
