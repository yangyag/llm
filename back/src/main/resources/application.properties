spring.application.name=llm-backend
app.cors.allowed-origins=http://localhost:5174,http://localhost:8083
spring.datasource.url=jdbc:postgresql://${APP_DB_HOST:host.docker.internal}:${APP_DB_PORT:5432}/${APP_DB_NAME:yangyag}
spring.datasource.username=${APP_DB_USER:yangyag}
spring.datasource.password=${APP_DB_PASSWORD:yangyag1!}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
app.attachments.root-path=${APP_ATTACHMENTS_ROOT_PATH:${java.io.tmpdir}/llm-attachments}
app.attachments.max-generated-file-size=${APP_ATTACHMENTS_MAX_GENERATED_FILE_SIZE:2GB}
app.upload-sessions.root-path=${APP_UPLOAD_SESSIONS_ROOT_PATH:${java.io.tmpdir}/llm-upload-sessions}
app.upload-sessions.expiration-ms=${APP_UPLOAD_SESSIONS_EXPIRATION_MS:86400000}
app.upload-sessions.cleanup-fixed-delay-ms=${APP_UPLOAD_SESSIONS_CLEANUP_FIXED_DELAY_MS:3600000}
app.upload-sessions.max-decoded-chunk-size=${APP_UPLOAD_SESSIONS_MAX_DECODED_CHUNK_SIZE:100MB}
app.upload-sessions.secret=${APP_UPLOAD_SESSIONS_SECRET:defaultUploadSessionsSecretForDevelopmentOnlyMustBeAtLeast256Bits!!}
app.jwt.secret=${APP_JWT_SECRET:defaultSecretKeyForDevelopmentOnlyMustBeAtLeast256Bits!!}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
spring.servlet.multipart.max-file-size=${APP_ATTACHMENTS_MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${APP_ATTACHMENTS_MAX_REQUEST_SIZE:100MB}
