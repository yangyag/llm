spring.datasource.url=jdbc:h2:mem:board;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
app.attachments.root-path=${java.io.tmpdir}/llm-test-attachments
app.attachments.max-generated-file-size=10MB
app.upload-sessions.root-path=${java.io.tmpdir}/llm-test-upload-sessions
app.upload-sessions.expiration-ms=86400000
app.upload-sessions.cleanup-fixed-delay-ms=3600000
app.upload-sessions.max-decoded-chunk-size=2MB
app.upload-sessions.secret=testUploadSessionsSecretForTestingPurposesOnlyMustBeAtLeast256BitsLong!!
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
app.jwt.secret=testSecretKeyForTestingPurposesOnlyMustBeAtLeast256BitsLong!!
app.jwt.expiration-ms=3600000
